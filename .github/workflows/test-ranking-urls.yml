name: Test Ranking URLs

on:
  workflow_dispatch:

jobs:
  test-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright -q
          python3 -m playwright install chromium

      - name: Trouver et tester l'API WTT interne
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import requests, json

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "application/json, */*",
          }

          ranking_calls = []

          def on_response(response):
              url = response.url
              if "ranking" in url.lower() and response.status == 200:
                  ct = response.headers.get("content-type", "")
                  if "json" in ct:
                      try:
                          body = response.json()
                          size = len(str(body))
                          ranking_calls.append({
                              "url": url,
                              "size": size,
                              "headers": dict(response.headers),
                              "body": body,
                          })
                      except:
                          pass

          print("Ouverture de la page WTT avec Playwright...")
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.on("response", on_response)
              page.goto("https://www.worldtabletennis.com/rankings?type=ms",
                        wait_until="networkidle", timeout=40000)
              browser.close()

          print(f"\n{len(ranking_calls)} appels 'ranking' interceptés\n")

          # Afficher les URLs complètes + structure des données
          for call in ranking_calls:
              print(f"URL COMPLÈTE : {call['url']}")
              print(f"  size={call['size']}")
              body = call['body']
              if isinstance(body, dict):
                  top_keys = list(body.keys())[:6]
                  print(f"  clés: {top_keys}")
                  # Chercher une liste de joueurs
                  for k, v in body.items():
                      if isinstance(v, list) and len(v) > 10:
                          sample = v[:2]
                          print(f"  body['{k}'] = liste de {len(v)} éléments")
                          print(f"  exemple[0]: {str(sample[0])[:200]}")
                          break
              elif isinstance(body, list) and len(body) > 10:
                  print(f"  liste de {len(body)} éléments")
                  print(f"  exemple[0]: {str(body[0])[:200]}")
              print()

          # Essayer d'appeler directement les URLs ranking trouvées (sans Playwright)
          print("\n" + "="*70)
          print("  TEST ACCÈS DIRECT (sans navigateur)")
          print("="*70)

          for call in ranking_calls:
              url = call["url"]
              # Récupérer les headers utilisés par le navigateur
              req_headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "Accept": "application/json, */*",
                  "Origin": "https://www.worldtabletennis.com",
                  "Referer": "https://www.worldtabletennis.com/",
              }
              try:
                  r = requests.get(url, headers=req_headers, timeout=15)
                  info = f"HTTP {r.status_code}  size={len(r.text)}"
                  if r.status_code == 200:
                      try:
                          data = r.json()
                          info += f"  ✅ JSON parsé"
                          # Compter les joueurs
                          players = []
                          if isinstance(data, list):
                              players = data
                          elif isinstance(data, dict):
                              for v in data.values():
                                  if isinstance(v, list) and len(v) > 10:
                                      players = v
                                      break
                          if players:
                              info += f"  → {len(players)} entrées"
                      except:
                          info += "  (pas JSON)"
                  print(f"  {url[:80]}")
                  print(f"    → {info}\n")
              except Exception as e:
                  print(f"  {url[:80]}")
                  print(f"    → Exception: {e}\n")

          EOF
