name: Test Ranking URLs

on:
  workflow_dispatch:

jobs:
  test-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Inspecter structure SEN_SINGLES.json
        run: |
          python3 - <<'EOF'
          import requests, json

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "application/json, */*",
              "Origin": "https://www.worldtabletennis.com",
              "Referer": "https://www.worldtabletennis.com/",
          }

          url = "https://wtt-web-frontdoor-withoutcache-cqakg0andqf5hchn.a01.azurefd.net/ranking/SEN_SINGLES.json"

          r = requests.get(url, headers=HEADERS, timeout=20)
          print(f"HTTP {r.status_code}  size={len(r.text)}")

          data = r.json()
          players = data.get("Result", [])
          print(f"Total joueurs : {len(players)}")
          print()

          # Afficher les 3 premiers joueurs complets
          print("=== 3 premiers joueurs (structure complète) ===")
          for i, p in enumerate(players[:3]):
              print(f"\nJoueur {i+1}:")
              for k, v in p.items():
                  print(f"  {k}: {v}")

          # Afficher aussi un joueur féminin si la liste en contient
          print("\n=== Chercher une joueuse ===")
          for p in players:
              gender = p.get("Gender", p.get("SubEventCode", p.get("GenderCode", "")))
              if "f" in str(gender).lower() or "w" in str(gender).lower():
                  print(f"Première joueuse trouvée:")
                  for k, v in p.items():
                      print(f"  {k}: {v}")
                  break

          # Compter par valeur unique du champ Gender/SubEventCode
          print("\n=== Répartition par genre ===")
          for field in ["Gender", "SubEventCode", "GenderCode", "EventGender"]:
              values = {}
              for p in players:
                  v = p.get(field)
                  if v:
                      values[v] = values.get(v, 0) + 1
              if values:
                  print(f"  {field}: {values}")

          # Afficher les champs disponibles contenant "rank"
          print("\n=== Champs contenant 'rank' ===")
          sample = players[0] if players else {}
          for k in sample:
              if "rank" in k.lower():
                  print(f"  {k}: {sample[k]}")

          EOF
