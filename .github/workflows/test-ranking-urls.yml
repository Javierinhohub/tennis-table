name: Test Ranking URLs

on:
  workflow_dispatch:

jobs:
  test-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Test pagination results.ittf.link
        run: |
          pip install beautifulsoup4 -q
          python3 - <<'EOF'
          import requests
          from bs4 import BeautifulSoup

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
          }

          BASE_URLS = {
              "H": "https://results.ittf.link/index.php/ittf-rankings/ittf-ranking-men-singles",
              "F": "https://results.ittf.link/index.php/ittf-rankings/ittf-ranking-women-singles",
          }

          # Variantes de pagination Joomla / PHP
          PAGINATION_PARAMS = [
              "?limitstart=50",
              "?start=50",
              "?page=2",
              "?p=2",
              "?offset=50",
              "?limit=100",
              "?limit=200",
              "?limitstart=0&limit=100",
              "?limitstart=0&limit=200",
          ]

          def parse_players(html):
              soup = BeautifulSoup(html, "html.parser")
              players = []
              for table in soup.find_all("table"):
                  for row in table.find_all("tr"):
                      cells = [td.get_text(strip=True) for td in row.find_all("td")]
                      if len(cells) < 5:
                          continue
                      try:
                          rang = int(cells[0])
                          if 1 <= rang <= 500:
                              nom = cells[4]
                              pays = cells[6] if len(cells) > 6 else ""
                              if nom:
                                  players.append((rang, nom, pays))
                      except ValueError:
                          pass
              return sorted(players, key=lambda x: x[0])

          print("\n" + "="*70)
          print("  TEST PAGINATION results.ittf.link")
          print("="*70)

          for genre, base in BASE_URLS.items():
              label = "Hommes" if genre == "H" else "Femmes"
              print(f"\n  ── {label} ──")

              # Page de base
              r = requests.get(base, headers=HEADERS, timeout=30)
              p0 = parse_players(r.text)
              print(f"  Page base ({len(r.text)} chars) : {len(p0)} joueurs  [#{p0[0][0]}..#{p0[-1][0]}]")

              # Tester chaque variante de pagination
              for param in PAGINATION_PARAMS:
                  url = base + param
                  try:
                      r2 = requests.get(url, headers=HEADERS, timeout=20)
                      players = parse_players(r2.text)
                      if players:
                          same_as_base = players == p0
                          ranks = f"#{players[0][0]}..#{players[-1][0]}"
                          note = " ← MÊME QUE BASE" if same_as_base else f" ← NOUVEAUX ! {players[:2]}"
                          print(f"  {param:35s} → {len(players)} joueurs {ranks}{note}")
                      else:
                          print(f"  {param:35s} → 0 joueurs (HTTP {r2.status_code})")
                  except Exception as e:
                      print(f"  {param:35s} → Exception: {e}")

          EOF
