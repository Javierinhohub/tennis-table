name: Test Ranking URLs

on:
  workflow_dispatch: # déclenchement manuel uniquement

jobs:
  test-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Test toutes les URLs de classement
        run: |
          python3 - <<'EOF'
          import requests, json

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (compatible; TT-Kip Rankings Bot/1.0)",
              "Accept": "application/json, text/html, */*",
          }

          URLS = [
              # ITTF JSON API
              "https://ranking.ittf.com/api/v1/ranking?type=ms&limit=200",
              "https://ranking.ittf.com/api/v1/ranking?type=ms&limit=100",
              "https://ranking.ittf.com/api/v1/ranking?type=ms&page=1&pageSize=50",
              "https://ranking.ittf.com/api/v1/ranking?type=ms&page=2&pageSize=50",
              "https://ranking.ittf.com/api/v1/ranking?type=ms&limit=50&offset=0",
              "https://ranking.ittf.com/api/v1/ranking?type=ms&limit=50&offset=50",
              "https://ranking.ittf.com/api/v1/ranking?type=ms&page=1",
              "https://ranking.ittf.com/api/v1/ranking?type=ms&page=2",
              # WTT rankings
              "https://www.worldtabletennis.com/rankings?type=ms&pageSize=200",
              "https://www.worldtabletennis.com/rankings?type=ms&pageSize=100",
              "https://www.worldtabletennis.com/rankings?type=ms&pageSize=50&page=1",
              "https://www.worldtabletennis.com/rankings?type=ms&pageSize=50&page=2",
              # WTT allplayersranking
              "https://www.worldtabletennis.com/allplayersranking?Age=SENIOR&selectedTab=MEN'S+SINGLES&pageSize=200",
              "https://www.worldtabletennis.com/allplayersranking?Age=SENIOR&selectedTab=MEN'S+SINGLES&pageSize=100",
              "https://www.worldtabletennis.com/allplayersranking?Age=SENIOR&selectedTab=MEN'S+SINGLES&pageSize=50&page=1",
              "https://www.worldtabletennis.com/allplayersranking?Age=SENIOR&selectedTab=MEN'S+SINGLES&pageSize=50&page=2",
              # ITTF HTML
              "https://results.ittf.link/index.php/ittf-rankings/ittf-ranking-men-singles",
          ]

          def count_players(data):
              """Compte les entrées avec rang+nom dans la réponse JSON."""
              items = data if isinstance(data, list) else (
                  data.get("data") or data.get("results") or
                  data.get("rankings") or []
              )
              count = 0
              for item in items:
                  rang = item.get("rank") or item.get("position") or item.get("ranking")
                  nom = item.get("name") or item.get("playerName") or item.get("fullName")
                  if rang and nom:
                      count += 1
              return count

          print("\n" + "="*70)
          print("  TEST DES URLS DE CLASSEMENT DEPUIS GITHUB ACTIONS")
          print("="*70 + "\n")

          results = []
          for url in URLS:
              try:
                  r = requests.get(url, headers=HEADERS, timeout=15)
                  status = r.status_code
                  if status == 200:
                      content_type = r.headers.get("content-type", "")
                      if "json" in content_type:
                          try:
                              data = r.json()
                              n = count_players(data)
                              preview = str(data)[:100]
                              results.append((url, status, f"JSON ✅  {n} joueurs  |  {preview}"))
                          except Exception as e:
                              results.append((url, status, f"JSON parse error: {e}"))
                      else:
                          results.append((url, status, f"HTML {len(r.text)} chars  ct={content_type[:40]}"))
                  else:
                      results.append((url, status, f"❌ HTTP {status}"))
              except Exception as e:
                  results.append((url, 0, f"❌ Exception: {e}"))

          for url, status, info in results:
              short = url[8:70]  # sans https://
              print(f"  {status}  {short}")
              print(f"       → {info}\n")

          EOF
