name: Test Ranking URLs

on:
  workflow_dispatch:

jobs:
  test-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Test et parsing des sources de classement
        run: |
          pip install beautifulsoup4 -q
          python3 - <<'EOF'
          import requests, re
          from bs4 import BeautifulSoup

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.5",
          }

          print("\n" + "="*70)
          print("  PARSING results.ittf.link — Hommes")
          print("="*70)

          for url in [
              "https://results.ittf.link/index.php/ittf-rankings/ittf-ranking-men-singles",
              "https://results.ittf.link/index.php/ittf-rankings/ittf-ranking-women-singles",
          ]:
              genre = "Hommes" if "men" in url else "Femmes"
              r = requests.get(url, headers=HEADERS, timeout=30)
              print(f"\n  [{genre}] HTTP {r.status_code} — {len(r.text)} chars")

              soup = BeautifulSoup(r.text, "html.parser")
              tables = soup.find_all("table")
              print(f"  Tables trouvées : {len(tables)}")

              players = []
              for table in tables:
                  rows = table.find_all("tr")
                  for row in rows:
                      cells = [td.get_text(strip=True) for td in row.find_all("td")]
                      if len(cells) < 3:
                          continue
                      # Chercher un rang en première colonne
                      try:
                          rang = int(cells[0])
                          if 1 <= rang <= 200:
                              # Trouver la colonne nom (premiere avec du texte alphabetique)
                              nom = next((c for c in cells[1:] if len(c) > 3 and any(ch.isalpha() for ch in c) and not c.isdigit()), "")
                              if nom:
                                  players.append((rang, nom, cells))
                      except ValueError:
                          pass

              players.sort(key=lambda x: x[0])
              print(f"  Joueurs parsés : {len(players)}")
              if players:
                  print(f"  Top 5 :")
                  for rang, nom, cells in players[:5]:
                      print(f"    #{rang} {nom}  — cellules brutes: {cells[:8]}")
                  print(f"  Rang max trouvé : #{players[-1][0]} {players[-1][1]}")

          # Tester aussi l'API WTT interne (souvent /api/ranking ou similaire)
          print("\n" + "="*70)
          print("  TEST APIs internes WTT")
          print("="*70)
          api_variants = [
              "https://www.worldtabletennis.com/api/ranking/ms?limit=200",
              "https://www.worldtabletennis.com/api/ranking/ms",
              "https://www.worldtabletennis.com/api/rankings?type=ms&limit=200",
              "https://www.worldtabletennis.com/api/rankings/ms",
              "https://www.worldtabletennis.com/api/v1/rankings?type=ms",
              "https://www.worldtabletennis.com/api/v2/rankings?type=ms",
              "https://sportsx.ittf.com/api/ranking?type=ms&limit=200",
              "https://api.worldtabletennis.com/rankings?type=ms",
          ]
          for url in api_variants:
              try:
                  r = requests.get(url, headers=HEADERS, timeout=10)
                  ct = r.headers.get("content-type","")
                  info = f"HTTP {r.status_code}  ct={ct[:40]}  size={len(r.text)}"
                  if r.status_code == 200 and "json" in ct:
                      info += f"  preview={r.text[:80]}"
                  print(f"  {url[8:65]}\n    → {info}")
              except Exception as e:
                  print(f"  {url[8:65]}\n    → Exception: {e}")

          EOF
