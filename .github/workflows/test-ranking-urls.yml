name: Test Ranking URLs

on:
  workflow_dispatch:

jobs:
  test-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright -q
          python3 -m playwright install chromium

      - name: Test scraping WTT avec Playwright
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import json, re

          print("\n" + "="*70)
          print("  SCRAPING WTT RANKINGS AVEC PLAYWRIGHT (navigateur headless)")
          print("="*70)

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              # Intercepter les requêtes API faites par la SPA
              api_calls = []
              def on_response(response):
                  ct = response.headers.get("content-type", "")
                  if "json" in ct and response.status == 200:
                      url = response.url
                      try:
                          body = response.json()
                          size = len(str(body))
                          api_calls.append((url, size, body))
                          print(f"  📡 API call interceptée: {url[:80]}")
                          print(f"     size={size}  preview={str(body)[:120]}\n")
                      except:
                          pass

              page.on("response", on_response)

              for genre, url in [
                  ("Hommes", "https://www.worldtabletennis.com/rankings?type=ms"),
                  ("Femmes", "https://www.worldtabletennis.com/rankings?type=ws"),
              ]:
                  print(f"\n  ── {genre} ({url}) ──")
                  page.goto(url, wait_until="networkidle", timeout=30000)

                  # Attendre que les données se chargent
                  try:
                      page.wait_for_selector("table, .ranking-row, [class*='rank'], tr", timeout=10000)
                  except:
                      print("  ⚠️  Timeout selector")

                  # Extraire via DOM
                  html = page.content()
                  print(f"  HTML rendu : {len(html)} chars")

                  # Chercher les rangs dans le DOM
                  rows = page.query_selector_all("tr")
                  players = []
                  for row in rows:
                      cells = row.query_selector_all("td")
                      texts = [c.inner_text().strip() for c in cells]
                      if len(texts) >= 3:
                          try:
                              rang = int(texts[0])
                              nom = next((t for t in texts[1:] if len(t) > 3 and any(c.isalpha() for c in t)), "")
                              if nom:
                                  players.append((rang, nom))
                          except:
                              pass

                  players.sort(key=lambda x: x[0])
                  print(f"  Joueurs extraits du DOM : {len(players)}")
                  if players:
                      print(f"  Top 5 : {players[:5]}")
                      print(f"  Rang max : #{players[-1][0]} {players[-1][1]}")

              browser.close()

              print("\n" + "="*70)
              print(f"  Total appels API JSON interceptés : {len(api_calls)}")
              for url, size, body in api_calls:
                  print(f"  {url[:90]}  size={size}")

          EOF
